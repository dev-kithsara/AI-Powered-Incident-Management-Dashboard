name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: incident_management
          POSTGRES_USER: ims_user
          POSTGRES_PASSWORD: ims_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ims_user -d incident_management"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ims_user:ims_password@localhost:5432/incident_management
      JWT_SECRET: github-actions-test-secret
      REDIS_URL: redis://localhost:6379
      AI_SERVICE_URL: http://localhost:8001
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Run backend tests
        run: npm test -- --passWithNoTests --runInBand

  ai-service:
    name: AI service validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai_service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai_service/requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install CPU-only torch
        run: pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install --no-cache-dir --retries 5 --timeout 300 -r requirements.txt

      - name: Compile Python files
        run: python -m compileall .