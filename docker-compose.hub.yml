version: '3.9'

# ============================================================
#  AI-Powered Incident Management Dashboard
#  Docker Hub Version — kithsilva
#
#  SETUP (First Time):
#    1. Install Docker Desktop: https://docs.docker.com/get-docker/
#    2. Open terminal in this folder
#    3. docker-compose -f docker-compose.hub.yml up -d
#    4. docker-compose -f docker-compose.hub.yml exec backend npx prisma db push --accept-data-loss
#    5. docker-compose -f docker-compose.hub.yml exec backend node prisma/seed.js
#    6. Open http://localhost:3000
#       Login: admin@ims.com / Admin@123
#
#  DAILY USE:
#    Start: docker-compose -f docker-compose.hub.yml up -d
#    Stop:  docker-compose -f docker-compose.hub.yml down
# ============================================================

services:
  # ── PostgreSQL 16 with pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ims_postgres
    environment:
      POSTGRES_DB:       incident_management
      POSTGRES_USER:     ims_user
      POSTGRES_PASSWORD: ims_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims_user -d incident_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ims_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js Backend ──────────────────────────────────────────────────────
  backend:
    image: kithsilva/ims-backend:latest
    container_name: ims_backend
    environment:
      DATABASE_URL:   postgresql://ims_user:ims_password@postgres:5432/incident_management
      AI_SERVICE_URL: http://ai-service:8001
      REDIS_URL:      redis://redis:6379
      FRONTEND_URL:   http://localhost:3000
      JWT_SECRET:     supersecretjwtkey2024
      NODE_ENV:       production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Python AI Service ────────────────────────────────────────────────────
  ai-service:
    image: kithsilva/ims-ai-service:latest
    container_name: ims_ai_service
    environment:
      DATABASE_URL: postgresql+asyncpg://ims_user:ims_password@postgres:5432/incident_management
      AI_API_KEY:   internal_ai_key
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ai_models:/app/models
    restart: unless-stopped

  # ── React Frontend ───────────────────────────────────────────────────────
  frontend:
    image: kithsilva/ims-frontend:latest
    container_name: ims_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ai_models:
