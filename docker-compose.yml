services:
  # ── PostgreSQL 16 with pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB:       incident_management
      POSTGRES_USER:     ims_user
      POSTGRES_PASSWORD: ims_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims_user -d incident_management"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Node.js Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://ims_user:ims_password@postgres:5432/incident_management
      AI_SERVICE_URL: http://ai-service:8001
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  # ── Python AI Service ────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
      network: host
    env_file: ./ai_service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://ims_user:ims_password@postgres:5432/incident_management
      AI_API_KEY: internal_ai_key
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ai_service:/app
      - ai_models:/app/models
    restart: unless-stopped

  # ── React Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped

# ── Named Volumes ────────────────────────────────────────────────────────────
# Docker Engine manages the host path for each named volume.
# Data is stored at: /var/lib/docker/volumes/ims_<name>/_data/
# These volumes survive container stop/restart/rm — only destroyed by:
#   docker-compose down -v   OR   docker volume rm <name>
volumes:
  postgres_data:
    driver: local
    labels:
      com.ims.description: "PostgreSQL 16 database files for incident_management"
      com.ims.backup: "required"

  redis_data:
    driver: local
    labels:
      com.ims.description: "Redis cache persistence"
      com.ims.backup: "optional"

  ai_models:
    driver: local
    labels:
      com.ims.description: "AI model cache and K-Means clustering artifacts"
      com.ims.backup: "optional"
